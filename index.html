<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheduler</title>
<meta name="theme-color" content="#fcf8ff">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Scheduler">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Material 3 — Light */
    --bg: #fcf8ff;
    --card: #f5f2fe;
    --card-solid: #ffffff;
    --primary: #4648d4;
    --primary-2: #6063ee;
    --primary-dark: #2f2ebe;
    --primary-soft: #e1e0ff;
    --accent: #904900;
    --text: #1b1b23;
    --muted: #464554;
    --line: #c7c4d7;
    --done: #767586;
    --green: #1f9d57;
    --green-soft: #c8f5dc;
    --input-bg: #efecf8;
    --shadow: 0 1px 3px rgba(27, 27, 35, 0.06), 0 1px 2px rgba(27, 27, 35, 0.04);
    --shadow-lg: 0 8px 24px rgba(27, 27, 35, 0.08), 0 2px 6px rgba(27, 27, 35, 0.05);
    --ring: 0 0 0 3px rgba(70, 72, 212, 0.18);
    /* 반경 스케일 (M3) */
    --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 28px; --r-pill: 999px;
    /* 간격 스케일 */
    --sp-1: 8px; --sp-2: 12px; --sp-3: 16px; --sp-4: 24px; --sp-5: 32px;
  }
  html[data-theme="dark"] {
    /* Material 3 — Dark */
    --bg: #131318;
    --card: #1f1f25;
    --card-solid: #26262e;
    --primary: #c0c1ff;
    --primary-2: #a9aaff;
    --primary-dark: #e1e0ff;
    --primary-soft: #2f2ebe;
    --accent: #ffb783;
    --text: #e5e1ee;
    --muted: #c7c4d7;
    --line: #46454f;
    --done: #908f9e;
    --green: #5bd98a;
    --green-soft: #0c3d24;
    --input-bg: #2b2a32;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 10px 28px rgba(0, 0, 0, 0.55), 0 4px 8px rgba(0, 0, 0, 0.4);
    --ring: 0 0 0 3px rgba(192, 193, 255, 0.25);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Pretendard','Segoe UI','Malgun Gothic',sans-serif;
    background: var(--bg);
    color: var(--text); padding: 32px 48px 140px; font-size: 15px; line-height: 1.6;
    transition: background-color .3s, color .3s; letter-spacing: -0.015em;
  }
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal;
    line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap;
    direction: ltr; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .wrap { max-width: 480px; margin: 0 auto; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-3);
    position: sticky; top: 0; z-index: 50; background: var(--bg); padding-top: 4px;
    margin-left: -16px; margin-right: -16px; padding-left: 16px; padding-right: 16px; }

  /* ===== 가로 날짜 스트립 (M3 모바일) ===== */
  .datestrip { display: flex; gap: 10px; overflow-x: auto; padding: 2px 2px 4px; margin-bottom: var(--sp-4);
    scrollbar-width: none; }
  .datestrip::-webkit-scrollbar { display: none; }
  .ds-day { flex: 0 0 auto; width: 54px; height: 70px; cursor: pointer; border-radius: var(--r-lg);
    background: var(--card-solid); border: 1px solid var(--line); color: var(--muted);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    font-family: inherit; transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); }
  .ds-day .ds-dow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .ds-day .ds-num { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .ds-day:hover { border-color: var(--primary); color: var(--text); transform: translateY(-1px); }
  .ds-day.today:not(.active) .ds-num { color: var(--primary); }
  .ds-day.active { background: var(--primary); border-color: var(--primary); color: var(--card-solid);
    box-shadow: 0 6px 14px rgba(70, 72, 212, 0.3); }
  html[data-theme="dark"] .ds-day.active { color: #1b1b23; }
  .brand { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .brand .logo { width: 38px; height: 38px; border-radius: var(--r-md);
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    display: grid; place-items: center; font-size: 18px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
  .theme-toggle { display: inline-flex; align-items: center; gap: 8px; background: var(--card-solid);
    border: 1px solid var(--line); border-radius: var(--r-pill); padding: 8px 14px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--text); box-shadow: var(--shadow); transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); }
  .theme-toggle:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); border-color: var(--muted); }
  /* 모바일 빌드: 상단 토글은 아이콘만 */
  .topbar .theme-toggle { padding: 9px; width: 40px; height: 40px; justify-content: center; border-radius: var(--r-md); }
  .topbar .theme-toggle > span:last-child { display: none; }
  .topbar .theme-toggle > span:first-child { font-size: 17px; }
  .topbar > div { gap: 8px !important; }

  .datebar { display: flex; align-items: center; justify-content: center; gap: 16px;
    background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 16px 24px; margin-bottom: var(--sp-4); box-shadow: var(--shadow); }
  .datebar h1 { font-size: 20px; font-weight: 700; min-width: 200px; text-align: center; letter-spacing: -0.02em; }
  .datebar .sub { display: block; font-size: 13px; color: var(--muted); font-weight: 500; margin-top: 2px; }
  .nav-btn { width: 40px; height: 40px; border: 1px solid var(--line); cursor: pointer; border-radius: var(--r-md);
    background: var(--card-solid); color: var(--text); font-size: 16px; transition: all .2s; display: grid; place-items: center; }
  .nav-btn:hover { background: var(--input-bg); color: var(--primary); border-color: var(--primary-soft); }
  .today-btn { border: none; cursor: pointer; border-radius: var(--r-md); padding: 10px 20px;
    background: var(--text); color: var(--bg); font-weight: 600; font-size: 14px; margin-left: auto;
    transition: all .2s; }
  .today-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  .panel { display: none; animation: fade .3s ease; }
  .panel.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card { background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--line);
    border-radius: var(--r-xl); padding: var(--sp-4); box-shadow: var(--shadow); }

  .input-row { display: flex; gap: 10px; margin-bottom: var(--sp-4); flex-wrap: wrap; align-items: center; }
  .input-row input[type=text], .input-row input[type=time], .input-row select {
    border: 1px solid var(--line); background: var(--card-solid); color: var(--text);
    border-radius: var(--r-md); padding: 12px 16px; font-size: 14px; font-family: inherit; outline: none; transition: all .2s; }
  .input-row input[type=text] { flex: 1; min-width: 140px; }
  .input-row .tilde { display: flex; align-items: center; color: var(--muted); font-weight: 500; }
  .t-sel { border: 1px solid var(--line); background: var(--card-solid); color: var(--text);
    border-radius: var(--r-sm); padding: 12px 10px; font-size: 14px; font-family: inherit; font-weight: 500;
    outline: none; cursor: pointer; transition: all .2s; }
  .t-sel:focus, .input-row input:focus, .input-row select:focus { border-color: var(--primary); box-shadow: var(--ring); }
  .chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: -12px 0 var(--sp-4); }
  .chips-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .chip { border: 1px solid var(--line); background: var(--card-solid); color: var(--muted);
    cursor: pointer; border-radius: var(--r-pill); padding: 6px 12px; font-size: 12px; font-weight: 600;
    font-family: inherit; transition: all .2s; }
  .chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }
  .input-row input::placeholder { color: var(--muted); }
  .add-btn { border: none; background: var(--primary); color: #ffffff; cursor: pointer; border-radius: var(--r-md);
    padding: 0 20px; font-size: 20px; font-weight: 500; transition: all .2s; height: 46px; display: grid; place-items: center; }
  .add-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25); }

  .prog-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: var(--sp-4); }
  .progress { flex: 1; height: 8px; background: var(--input-bg); border-radius: var(--r-pill); overflow: hidden; }
  .progress > div { height: 100%; background: linear-gradient(90deg, var(--green), #34d399); width: 0; transition: width .5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: var(--r-pill); }
  .prog-label { font-size: 13px; font-weight: 600; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }

  ul { list-style: none; }
  .todo-li, .repeat-li { display: flex; align-items: center; gap: 16px; padding: 12px 16px; border-radius: var(--r-md);
    transition: all .2s; border: 1px solid transparent; }
  @keyframes pop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  .todo-li:hover, .repeat-li:hover { background: var(--input-bg); border-color: var(--line); }
  .todo-li + .todo-li, .repeat-li + .repeat-li { margin-top: 4px; }
  .item-text { flex: 1; word-break: break-all; font-weight: 500; font-size: 14px; }
  .todo-li.done .item-text { text-decoration: line-through; color: var(--done); }
  .chk { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; flex-shrink: 0;
    border: 2px solid var(--muted); border-radius: 6px; background: var(--card-solid);
    cursor: pointer; position: relative; transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); }
  .chk:hover { border-color: var(--green); }
  .chk:checked { background: var(--green); border-color: var(--green); }
  .chk::after { content: ''; position: absolute; left: 6px; top: 2px; width: 5px; height: 10px;
    border: solid #ffffff; border-width: 0 2px 2px 0; transform: rotate(45deg) scale(0);
    transition: transform .2s cubic-bezier(.3,1.5,.5,1); }
  .chk:checked::after { transform: rotate(45deg) scale(1); }
  .chk:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
  .icon-btn { border: none; background: transparent; cursor: pointer; color: var(--muted); font-size: 13px;
    font-family: inherit; font-weight: 600; padding: 6px 10px; border-radius: var(--r-sm); transition: all .2s;
    line-height: 1; opacity: 0; }
  .todo-li:hover .icon-btn, .repeat-li:hover .icon-btn, .vt-card:hover .icon-btn { opacity: 1; }
  .icon-btn:hover { color: var(--text); background: var(--line); }
  .icon-btn.del:hover { color: #ef4444; background: #fef2f2; }
  html[data-theme="dark"] .icon-btn.del:hover { background: #451a1a; }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 0; font-weight: 500; }

  .time-tag { background: var(--input-bg); color: var(--text); font-weight: 600;
    font-size: 12px; padding: 4px 8px; border-radius: var(--r-sm); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .repeat-tag { background: var(--primary-soft); color: var(--primary-dark); font-size: 11px;
    padding: 3px 8px; border-radius: var(--r-pill); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

  /* ===== 세로 라인 타임라인 ===== */
  .vtimeline { position: relative; padding-left: 12px; }
  .vt-item { position: relative; padding-left: 80px; padding-bottom: 24px; }
  .vt-item:last-child { padding-bottom: 0; }
  .vt-item::before { content: ''; position: absolute; left: 72px; top: 12px; bottom: -12px; width: 2px; background: var(--line); }
  .vt-item:last-child::before { display: none; }
  .vt-time { position: absolute; left: 0; top: 4px; width: 56px; text-align: right;
    font-size: 13px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .vt-time small { display: block; font-size: 11px; font-weight: 500; color: var(--muted); margin-top: 2px; }
  .vt-dot { position: absolute; left: 66px; top: 8px; width: 14px; height: 14px; border-radius: 50%;
    background: var(--card-solid); border: 2px solid var(--primary); z-index: 2; transition: all .2s; }
  .vt-item:hover .vt-dot { background: var(--primary); transform: scale(1.2); }
  .vt-item.repeat .vt-dot { border-color: var(--green); }
  .vt-item.repeat:hover .vt-dot { background: var(--green); }
  .vt-card { background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 16px 20px; box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 12px; transition: all .2s; }
  .vt-card:hover { border-color: var(--muted); box-shadow: var(--shadow-lg); }
  .vt-item.repeat .vt-card { border-left: 4px solid var(--green); }
  .vt-item:not(.repeat) .vt-card { border-left: 4px solid var(--primary); }
  .vt-main { flex: 1; min-width: 0; }
  .vt-title { font-size: 15px; font-weight: 600; word-break: break-word; color: var(--text); }
  .vt-meta { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .vt-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* ===== 편집 모달 ===== */
  .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fade .2s; }
  .overlay.show { display: flex; }
  .modal { background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-xl);
    padding: 32px; width: 100%; max-width: 440px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--text); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
  .field input, .field select { width: 100%; border: 1px solid var(--line); background: var(--input-bg);
    color: var(--text); border-radius: var(--r-md); padding: 12px 16px; font-size: 14px; font-family: inherit; outline: none; transition: all .2s; }
  .field input:focus, .field select:focus { border-color: var(--primary); box-shadow: var(--ring); background: var(--card-solid); }
  .field-row { display: flex; gap: 12px; align-items: center; }
  .field-row .field { flex: 1; margin-bottom: 0; }
  .modal-btns { display: flex; gap: 12px; margin-top: 32px; }
  .modal-btns button { flex: 1; border: none; cursor: pointer; border-radius: var(--r-md); padding: 12px;
    font-size: 14px; font-weight: 600; font-family: inherit; transition: all .2s; }
  .btn-cancel { background: var(--input-bg); color: var(--text); }
  .btn-cancel:hover { background: var(--line); }
  .btn-save { background: var(--primary); color: #ffffff; }
  .btn-save:hover { background: var(--primary-dark); }

  /* ===== 스타일 전환 세그먼트 ===== */
  .seg { display: inline-flex; background: var(--input-bg); border-radius: var(--r-lg); padding: 4px; margin-bottom: var(--sp-4); }
  .seg-btn { border: none; cursor: pointer; background: transparent; color: var(--muted);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: var(--r-md); transition: all .2s; }
  .seg-btn:hover { color: var(--text); }
  .seg-btn.active { background: var(--card-solid); color: var(--text); box-shadow: var(--shadow); }

  /* ===== 원형 시계 시간표 ===== */
  .clock-single { position: relative; width: 100%; max-width: 400px; margin: 0 auto; }
  .clock-svg { width: 100%; display: block; overflow: visible; }
  .clock-tick { stroke: var(--line); stroke-width: 2; stroke-linecap: round; }
  .clock-tick.major { stroke: var(--muted); stroke-width: 3; }
  .clock-hourtext { fill: var(--muted); font-size: 12px; font-weight: 500; }
  .clock-hourtext.major { fill: var(--text); font-size: 14px; font-weight: 600; }
  .clock-arc { fill: none; stroke-width: 12; stroke-linecap: round; cursor: pointer;
    transition: stroke-width .2s, opacity .2s; }
  .clock-arc:hover, .clock-arc.hl { stroke-width: 16; opacity: 0.9; }
  .clock-hand { stroke: var(--accent); stroke-width: 2; stroke-linecap: round; }
  .clock-hand-dot { fill: var(--accent); }

  .clock-toggle { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 140px; height: 140px; border-radius: 50%; border: 1px solid var(--line); cursor: pointer;
    background: var(--card-solid); box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    font-family: inherit; transition: all .2s; }
  .clock-toggle:hover { box-shadow: var(--shadow-lg); border-color: var(--primary); }
  .ct-ampm { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--primary); text-transform: uppercase; }
  .ct-half { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
  .ct-cnt { font-size: 12px; font-weight: 500; color: var(--muted); }
  .clock-legend { width: 100%; margin-top: var(--sp-4); }
  .cl-li { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--r-md); transition: all .2s; border: 1px solid transparent; }
  .cl-li:hover, .cl-li.hl { background: var(--input-bg); border-color: var(--line); }
  .cl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cl-time { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; min-width: 80px; font-variant-numeric: tabular-nums; }
  .cl-text { flex: 1; font-weight: 500; font-size: 14px; }

  /* ===== 벤토박스 레이아웃 ===== */
  .bento { display: grid; grid-template-columns: 320px minmax(0,1fr) 380px; gap: var(--sp-4); align-items: start; }
  .col { display: flex; flex-direction: column; gap: var(--sp-4); min-width: 0; }
  .widget { background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-xl);
    padding: var(--sp-5); box-shadow: var(--shadow); }
  .widget > h2 { font-size: 15px; font-weight: 800; margin-bottom: var(--sp-4);
    display: flex; align-items: center; gap: 9px; }
  .w-badge { font-size: 12px; font-weight: 800; color: var(--muted); background: var(--input-bg);
    padding: 2px 9px; border-radius: var(--r-pill); }
  @media (max-width: 1120px) {
    .bento { grid-template-columns: 300px minmax(0,1fr); }
    .col-right { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; }
    .col-right > .widget { flex: 1 1 320px; }
  }
  @media (max-width: 760px) {
    .bento { grid-template-columns: 1fr; }
    .col-right { flex-direction: column; }
  }

  /* ===== 집중 모드 버튼 ===== */
  .focus-bar { display: flex; justify-content: flex-end; margin-bottom: var(--sp-3); }
  .focus-start { border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 10px 20px; border-radius: var(--r-pill); color: #ffffff;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
  .focus-start:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4); }

  /* ===== 라이브 타이머 ===== */
  .timer-card { background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--line);

<script>
// ===== 테마 =====
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeIcon').textContent  = t==='dark'?'☀️':'🌙';
  document.getElementById('themeLabel').textContent = t==='dark'?'Light':'Dark';
  localStorage.setItem('schedulerTheme',t);
}
applyTheme(localStorage.getItem('schedulerTheme')||'light');
document.getElementById('themeToggle').onclick=()=>{
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
};

// ===== 하단 독 네비게이션 =====
document.querySelectorAll('.dock-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.dock-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  };
});

// ===== 시간표 스타일 전환 (주간표 / 하루 / 시계) =====
let schView=localStorage.getItem('schedulerSchView')||'week';
function applySchView(v){
  schView=v; localStorage.setItem('schedulerSchView',v);
  document.querySelectorAll('#schSeg .seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('view-week').style.display = v==='week'?'':'none';
  document.getElementById('view-day').style.display  = v==='day'?'':'none';
  document.getElementById('view-clock').style.display= v==='clock'?'':'none';
}
document.querySelectorAll('#schSeg .seg-btn').forEach(b=>b.onclick=()=>applySchView(b.dataset.view));

// ===== 데이터 =====
const KEY='myScheduler';
let db=JSON.parse(localStorage.getItem(KEY)||'{}');
db.schedules=db.schedules||{}; db.todos=db.todos||{}; db.repeats=db.repeats||[];
let saveFlashTimer=null;
function save(){ localStorage.setItem(KEY,JSON.stringify(db));
  if(user && !applyingRemote){ clearTimeout(syncTimer); syncTimer=setTimeout(pushRemote,800); }
  const el=document.getElementById('autosave');
  if(el && !applyingRemote){ el.textContent=user?'☁ 동기화됨':'✓ 자동 저장됨';
    el.style.opacity='.35'; clearTimeout(saveFlashTimer); saveFlashTimer=setTimeout(()=>el.style.opacity='1',200); } }

let current=new Date();
const WEEK=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WEEK_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_EN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function key(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function dur(s,e){ let d=e-s; if(d<=0) d=30; const h=Math.floor(d/60),m=d%60; return ((h?h+'h':'')+(m?(h?' ':'')+m+'m':''))||'0m'; }

// ===== 시/분 드롭다운 + 빠른 길이 =====
const DURS=[['30m',30],['1h',60],['1h 30m',90],['2h',120]];
function populateTime(hId,mId,hhmm){
  const [hh,mm]=hhmm.split(':').map(Number);
  const hsel=document.getElementById(hId), msel=document.getElementById(mId);
  hsel.innerHTML=''; for(let h=0;h<24;h++){ const o=new Option(String(h).padStart(2,'0')+'h',h); if(h===hh)o.selected=true; hsel.add(o); }
  const mins=new Set(); for(let m=0;m<60;m+=5) mins.add(m); mins.add(mm);
  msel.innerHTML=''; [...mins].sort((a,b)=>a-b).forEach(m=>{ const o=new Option(String(m).padStart(2,'0')+'m',m); if(m===mm)o.selected=true; msel.add(o); });
}
function readTime(hId,mId){ return String(+document.getElementById(hId).value).padStart(2,'0')+':'+String(+document.getElementById(mId).value).padStart(2,'0'); }
function buildChips(containerId,sH,sM,eH,eM){
  const c=document.getElementById(containerId);
  DURS.forEach(([l,m])=>{ const b=document.createElement('button'); b.className='chip'; b.type='button'; b.textContent=l;
    b.onclick=()=>{ const s=toMin(readTime(sH,sM)); populateTime(eH,eM,minToStr(Math.min(s+m,1439))); };
    c.appendChild(b); });
}
function initTimeInputs(){
  populateTime('schH','schM','09:00'); populateTime('schEndH','schEndM','10:00');
  populateTime('repH','repM','07:00'); populateTime('repEndH','repEndM','08:00');
  buildChips('schChips','schH','schM','schEndH','schEndM');
  buildChips('repChips','repH','repM','repEndH','repEndM');
}

function render(){
  const isToday=key(current)===key(new Date());
  document.getElementById('dateMain').textContent=`${MON_EN[current.getMonth()]} ${current.getDate()} (${WEEK[current.getDay()]})`;
  document.getElementById('dateSub').textContent=`${current.getFullYear()}`+(isToday?' · Today':'');
  renderDateStrip();
  renderTodos(); renderWeekGrid(); renderTimeline(); renderClock(); renderRepeats();
}

// ===== 가로 날짜 스트립 (현재 주 월~일) =====
function weekDays7(){
  const d=new Date(current); const dow=(d.getDay()+6)%7; // 월=0
  const mon=new Date(d); mon.setDate(d.getDate()-dow);
  const arr=[]; for(let i=0;i<7;i++){ const x=new Date(mon); x.setDate(mon.getDate()+i); arr.push(x); }
  return arr;
}
function renderDateStrip(){
  const strip=document.getElementById('dateStrip'); if(!strip) return;
  const ck=key(current), tk=key(new Date());
  strip.innerHTML='';
  weekDays7().forEach(d=>{
    const dk=key(d);
    const b=document.createElement('button');
    b.className='ds-day'+(dk===ck?' active':'')+(dk===tk?' today':'');
    b.innerHTML=`<span class="ds-dow">${WEEK[d.getDay()]}</span><span class="ds-num">${d.getDate()}</span>`;
    b.onclick=()=>{ current=new Date(d); render(); };
    strip.appendChild(b);
  });
}

// ===== 시간표 스타일 전환 =====
const PALETTE=['#6d5efc','#ff6b9d','#22b8cf','#fab005','#f76707','#7950f2','#e64980','#0ca678'];
// 벤토 레이아웃: 타임라인·원형 시계가 각각 별도 위젯이라 항상 표시

// ----- 할 일 -----
function renderTodos(){
  renderStats();
  const k=key(current); const arr=db.todos[k]||[];
  const list=document.getElementById('todoList');
  const done=arr.filter(t=>t.done).length;
  document.getElementById('todoCount').textContent=`${done} / ${arr.length}`;
  document.getElementById('tabTodoBadge').textContent=arr.length;
  document.getElementById('progressBar').style.width=arr.length?`${done/arr.length*100}%`:'0';
  list.innerHTML='';
  if(!arr.length){ list.innerHTML='<div class="empty">No tasks yet — add one above</div>'; return; }
  arr.forEach((t,i)=>{
    const li=document.createElement('li'); li.className='todo-li'+(t.done?' done':'');
    const chk=document.createElement('input'); chk.type='checkbox'; chk.className='chk'; chk.checked=t.done;
    chk.onchange=()=>{ t.done=chk.checked; save(); renderTodos(); };
    const span=document.createElement('span'); span.className='item-text'; span.textContent=t.text;
    const edit=document.createElement('button'); edit.className='icon-btn'; edit.textContent='Edit';
    edit.onclick=()=>openEdit('todo',i);
    const del=document.createElement('button'); del.className='icon-btn del'; del.textContent='Delete';
    del.onclick=()=>{ arr.splice(i,1); save(); renderTodos(); };
    li.append(chk,span,edit,del); list.appendChild(li);
  });
}

// ----- 시간표 (세로 라인 타임라인) -----
function todayItems(){
  const k=key(current);
  const items=(db.schedules[k]||[]).map((it,idx)=>({...it,repeat:false,idx}));
  const day=current.getDay();
  db.repeats.forEach((r,ri)=>{ if(r.type==='daily'||Number(r.type)===day) items.push({time:r.time,end:r.end,text:r.text,repeat:true,ri}); });
  items.forEach(it=>{ it.s=toMin(it.time); if(it.end){ it.e=toMin(it.end); if(it.e<=it.s) it.e+=1440; } else { it.e=it.s+60; } });
  items.sort((a,b)=>a.s-b.s||a.e-b.e);
  return items;
}
function renderTimeline(){
  renderStats();
  const items=mergedToday();
  document.getElementById('tabSchBadge').textContent=items.length;
  const tl=document.getElementById('timeline'); tl.innerHTML='';
  if(!items.length){ tl.innerHTML='<div class="empty">Add a time block to get started</div>'; return; }
  items.forEach(it=>{
    const wrap=document.createElement('div'); wrap.className='vt-item'+(it.repeat?' repeat':'');
    wrap.innerHTML=`
      <div class="vt-time">${it.time}<small>${it.end}</small></div>
      <div class="vt-dot"></div>
      <div class="vt-card">
        <div class="vt-main">
          <div class="vt-title">${esc(it.text)}</div>
          <div class="vt-meta">${dur(it.s,it.e)}${it.repeat?' <span class="repeat-tag">Repeat</span>':''}</div>
        </div>
        <div class="vt-actions"></div>
      </div>`;
    const actions=wrap.querySelector('.vt-actions');
    if(it.repeat){
      const go=document.createElement('button'); go.className='icon-btn'; go.textContent='Edit'; go.title='Edit in Repeats';
      go.onclick=()=>openEdit('rep',it.members[0].ri); actions.appendChild(go);
    } else {
      const edit=document.createElement('button'); edit.className='icon-btn'; edit.textContent='Edit';
      edit.onclick=()=>openEdit('sch',it.members[0].idx); actions.appendChild(edit);
      const del=document.createElement('button'); del.className='icon-btn del'; del.textContent='Delete';
      del.onclick=()=>{ const k=key(current); it.members.map(m=>m.idx).sort((a,b)=>b-a).forEach(idx=>db.schedules[k].splice(idx,1)); save(); renderTimeline(); };
      actions.appendChild(del);
    }
    tl.appendChild(wrap);
  });
}
function minToStr(m){ return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }

// ----- 같은 제목의 연속(맞닿거나 겹치는) 일정을 표시상 하나로 병합 -----
function mergeRuns(items){
  const sorted=[...items].sort((a,b)=>a.s-b.s||a.e-b.e);
  const out=[];
  for(const it of sorted){
    const last=out[out.length-1];
    if(last && last.text===it.text && last.repeat===it.repeat && it.s<=last.e){
      last.e=Math.max(last.e,it.e);
      if(it.ref) last.members.push(it.ref);
    } else {
      out.push({s:it.s,e:it.e,text:it.text,repeat:it.repeat,members:it.ref?[it.ref]:[]});
    }
  }
  out.forEach(g=>{ g.time=minToStr(g.s); g.end=g.e>=1440?minToStr(g.e-1440):minToStr(g.e); });
  return out;
}
function mergedToday(){
  const raw=todayItems();
  raw.forEach(it=>{ it.ref=it.repeat?{ri:it.ri}:{idx:it.idx}; });
  const g=mergeRuns(raw);
  g.forEach((x,i)=>{ x.color=x.repeat?'#18b984':PALETTE[i%PALETTE.length]; x.dk='g'+i; });
  return g;
}
function mergedReal(){ return mergeRuns(realTodayItems()); }

// ----- 원형 시계 시간표 (오전/오후 12시간 2개) -----
// 자정 넘는 일정은 [s,1440]+[0,e-1440] 두 구간으로 분할
function segsOf(it){ return it.e>1440 ? [[it.s,1440],[0,it.e-1440]] : [[it.s,it.e]]; }
function polar(cx,cy,r,min,period){ const a=(min/period*360-90)*Math.PI/180; return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)}; }
function arcPath(cx,cy,r,s,e,period){
  if(e-s>=period){ e=s+period-0.1; }
  const p1=polar(cx,cy,r,s,period), p2=polar(cx,cy,r,e,period);
  const large=(e-s)>period/2?1:0;
  return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
}
let clockHalf=localStorage.getItem('schedulerClockHalf');
clockHalf = clockHalf==='720'?720 : clockHalf==='0'?0 : (new Date().getHours()<12?0:720);
function drawClock(base, items){
  const C=200, R=150, P=720;
  let svg=`<svg class="clock-svg" viewBox="0 0 400 400">`;
  // 바깥 은은한 트랙
  svg+=`<circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="var(--input-bg)" stroke-width="18"/>`;
  // 시간 눈금 + 12시 표기
  for(let i=0;i<12;i++){
    const major=i%3===0; const m=i*60;
    const a=polar(C,C,R+13,m,P), b=polar(C,C,R+(major?26:19),m,P);
    svg+=`<line class="clock-tick ${major?'major':''}" x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}"/>`;
    const t=polar(C,C,R+42,m,P); const num=i===0?12:i;
    svg+=`<text class="clock-hourtext ${major?'major':''}" x="${t.x.toFixed(1)}" y="${t.y.toFixed(1)}" text-anchor="middle" dominant-baseline="central">${num}</text>`;
  }
  // 일정 아크 (자정 넘는 일정은 분할해 이 반나절에 걸치는 부분만)
  items.forEach(it=>{
    segsOf(it).forEach(([ss,ee])=>{
      const cs=Math.max(ss,base), ce=Math.min(ee,base+P);
      if(ce<=cs) return;
      const GAP=5; // 인접 일정의 둥근 마감이 겹치지 않도록 끝을 살짝 트림
      let a=cs-base, b=Math.max(a+1, ce-base-GAP);
      svg+=`<path class="clock-arc ${it.repeat?'repeat':''}" d="${arcPath(C,C,R,a,b,P)}" stroke="${it.color}" data-key="${it.dk}"><title>${esc(it.text)} (${it.time}~${it.end})</title></path>`;
    });
  });
  // 현재 시각 바늘
  if(key(current)===key(new Date())){
    const now=new Date(); const nm=now.getHours()*60+now.getMinutes();
    if(nm>=base && nm<base+P){
      const h=polar(C,C,R-2,nm-base,P);
      svg+=`<line class="clock-hand" x1="${C}" y1="${C}" x2="${h.x.toFixed(1)}" y2="${h.y.toFixed(1)}"/>`;
      svg+=`<circle class="clock-hand-dot" cx="${h.x.toFixed(1)}" cy="${h.y.toFixed(1)}" r="5"/>`;
    }
  }
  svg+=`</svg>`;
  return svg;
}
function renderClock(){
  const view=document.getElementById('clockView');
  const items=mergedToday();
  if(!items.length){ view.innerHTML='<div class="empty">Add a time block to get started</div>'; return; }

  const label=clockHalf===0?'Morning':'Afternoon', other=clockHalf===0?'Afternoon':'Morning';
  const ampm=clockHalf===0?'AM':'PM';
  const cnt=items.filter(it=>segsOf(it).some(([ss,ee])=>ss<clockHalf+720 && ee>clockHalf)).length;
  const clocks=`<div class="clock-single">${drawClock(clockHalf,items)}
    <button class="clock-toggle" id="clockToggle" title="Switch to ${other}">
      <span class="ct-ampm">${ampm}</span>
      <span class="ct-half">${label}</span>
      <span class="ct-cnt">${cnt} ${cnt===1?'item':'items'}</span>
      <span class="ct-hint">View ${other}</span>
    </button></div>`;

  // 범례(클릭해서 수정)
  let legend='<div class="clock-legend">';
  items.forEach(it=>{
    legend+=`<div class="cl-li" data-key="${it.dk}" style="--hl-color:${it.color}"><span class="cl-dot" style="background:${it.color}"></span>
      <span class="cl-time">${it.time}~${it.end}</span>
      <span class="cl-text">${esc(it.text)}${it.repeat?' <span class="repeat-tag">Repeat</span>':''}</span>
      <span class="vt-actions" data-key="${it.dk}"></span></div>`;
  });
  legend+='</div>';
  view.innerHTML=`${clocks}${legend}`;

  // 가운데 버튼 → 오전/오후 전환
  const tg=document.getElementById('clockToggle');
  if(tg) tg.onclick=()=>{ clockHalf=clockHalf===0?720:0; localStorage.setItem('schedulerClockHalf',clockHalf); renderClock(); };

  const byKey=k=>items.find(x=>x.dk===k);
  function bindEdit(k){ const g=byKey(k); if(!g) return;
    if(g.repeat) openEdit('rep',g.members[0].ri); else openEdit('sch',g.members[0].idx); }
  view.querySelectorAll('.clock-arc').forEach(a=>a.onclick=()=>bindEdit(a.dataset.key));

// ===== 주간 그리드 시간표 (반복 일정 기반, 월~토) =====
function colorFor(text){ let h=0; for(let i=0;i<text.length;i++) h=(h*31+text.charCodeAt(i))>>>0; return PALETTE[h%PALETTE.length]; }
function weekDays(){ // 현재 날짜가 속한 주의 월~토
  const d=new Date(current); const dow=(d.getDay()+6)%7; // 월=0
  const mon=new Date(d); mon.setDate(d.getDate()-dow);
  const arr=[]; for(let i=0;i<6;i++){ const x=new Date(mon); x.setDate(mon.getDate()+i); arr.push(x); }
  return arr;
}
function repSpan(r){ let s=toMin(r.time), e=r.end?toMin(r.end):s+60; if(e<=s)e=s+60; if(e>1440)e=1440; return {s,e}; }
function renderWeekGrid(){
  const grid=document.getElementById('weekGrid'); if(!grid) return;
  const days=weekDays();
  const hasAny=db.repeats.length||days.some(d=>(db.schedules[key(d)]||[]).length);
  if(!hasAny){
    grid.style.gridTemplateColumns=''; grid.style.gridAutoRows=''; grid.style.display='block';
    grid.innerHTML='<div class="empty">Add a schedule or repeating item<br>and it\'ll appear here as your weekly grid</div>';
    return;
  }
  // 시간 범위(시 단위)로 커버. 블록은 분 단위로 정밀 배치.
  let loH=24, hiH=0;
  function expandRange(s,e){ const sH=Math.floor(s/60), eH=Math.ceil(e/60); if(sH<loH)loH=sH; if(eH>hiH)hiH=eH; }
  db.repeats.forEach(r=>{ const {s,e}=repSpan(r); expandRange(s,e); });
  days.forEach(d=>{ (db.schedules[key(d)]||[]).forEach(it=>{ const s=toMin(it.time), e=it.end?toMin(it.end):s+60; expandRange(s,e); }); });
  if(loH>=hiH){ loH=8; hiH=9; }
  const HOUR_PX=62, PPM=HOUR_PX/60, loMin=loH*60, H=(hiH-loH)*HOUR_PX;
  const hourLabel=h=>{ let hh=h%12; if(hh===0)hh=12; return hh+'<small>'+(h<12?'AM':'PM')+'</small>'; };
  const now=new Date(); const todayK=key(now); const nowMin=now.getHours()*60+now.getMinutes();
  grid.style.display='grid';
  grid.style.gridTemplateColumns='54px repeat(6,1fr)';
  grid.style.gridAutoRows='auto';

  // 헤더
  let html='<div class="wg-corner" style="grid-column:1;grid-row:1"></div>';
  days.forEach((d,i)=>{ const t=key(d)===todayK;
    html+=`<div class="wg-head${t?' today':''}" style="grid-column:${i+2};grid-row:1">
      <span class="wg-dow">${WEEK_EN[d.getDay()]}</span><span class="wg-date">${d.getDate()}</span></div>`; });

  // 시간 라벨 열
  let timeInner='';
  for(let h=loH;h<=hiH;h++) timeInner+=`<div class="wg-time2" style="top:${(h-loH)*HOUR_PX}px">${hourLabel(h)}</div>`;
  html+=`<div class="wg-timecol" style="grid-column:1;grid-row:2;height:${H}px">${timeInner}</div>`;

  // 요일 열: 시간선 + 분 단위 블록 + 현재 시각 라인
  days.forEach((d,i)=>{
    const t=key(d)===todayK; const dow=d.getDay(); const dk=key(d); let inner='';
    for(let h=loH;h<=hiH;h++) inner+=`<div class="wg-line" style="top:${(h-loH)*HOUR_PX}px"></div>`;
    if(t && nowMin>=loMin && nowMin<=loMin+(H/PPM))
      inner+=`<div class="wg-now" style="top:${(nowMin-loMin)*PPM}px"></div>`;
    const list=[];
    db.repeats.forEach((r,ri)=>{ if(r.type==='daily'||Number(r.type)===dow){ const {s,e}=repSpan(r); list.push({s,e,text:r.text,repeat:true,ref:{ri}}); } });
    (db.schedules[dk]||[]).forEach((it,idx)=>{ const s=toMin(it.time); let e=it.end?toMin(it.end):s+60; if(e<=s)e+=1440; list.push({s,e,text:it.text,repeat:false,ref:{dk,idx}}); });
    const groups=mergeRuns(list);
    // 겹치는 일정만 좌우로 분할 (실제 분 단위 겹침 기준)
    const clusters=[]; let ci=-1, clusterEnd=-1, lanes=[];
    groups.forEach(g=>{
      if(g.s>=clusterEnd){ ci++; lanes=[]; clusters[ci]={lanes:0}; clusterEnd=g.e; }
      else clusterEnd=Math.max(clusterEnd,g.e);
      let lane=lanes.findIndex(end=>end<=g.s);
      if(lane===-1){ lane=lanes.length; lanes.push(g.e); } else lanes[lane]=g.e;
      g.lane=lane; g.ci=ci; clusters[ci].lanes=Math.max(clusters[ci].lanes,lane+1);
    });
    groups.forEach(g=>{
      const n=clusters[g.ci].lanes, w=100/n, left=g.lane*w, c=g.repeat?colorFor(g.text):PALETTE[list.filter(x=>!x.repeat).findIndex(x=>x.text===g.text)%PALETTE.length]||colorFor(g.text);
      const top=(g.s-loMin)*PPM, hgt=Math.max((g.e-g.s)*PPM-3, 20);
      const short=hgt<46?' short':'';
      const m=g.members[0];
      if(g.repeat){
        inner+=`<button class="wg-block${short}" data-type="rep" data-ri="${m.ri}" style="--c:${c};top:${top}px;height:${hgt}px;left:calc(${left}% + 2px);width:calc(${w}% - 4px)">
          <span class="wg-t">${esc(g.text)}</span><span class="wg-sub">${minToStr(g.s)}–${g.e>=1440?'24:00':minToStr(g.e)}</span></button>`;
      } else {
        inner+=`<button class="wg-block${short}" data-type="sch" data-dk="${m.dk}" data-idx="${m.idx}" style="--c:${c};top:${top}px;height:${hgt}px;left:calc(${left}% + 2px);width:calc(${w}% - 4px)">
          <span class="wg-t">${esc(g.text)}</span><span class="wg-sub">${minToStr(g.s)}–${g.e>=1440?'24:00':minToStr(g.e)}</span></button>`;
      }
    });
    html+=`<div class="wg-col${t?' today':''}" style="grid-column:${i+2};grid-row:2;height:${H}px">${inner}</div>`;
  });
  grid.innerHTML=html;
  grid.querySelectorAll('.wg-block').forEach(b=>{
    b.onclick=()=>{
      if(b.dataset.type==='rep') openEdit('rep',+b.dataset.ri);
      else { current=new Date(b.dataset.dk); render(); openEdit('sch',+b.dataset.idx); }
    };
  });
}

// ===== 라이브 타이머 (실제 오늘 일정 기준) =====
function realTodayItems(){
  const now=new Date(); const k=key(now); const day=now.getDay();
  const items=(db.schedules[k]||[]).map(it=>({...it,repeat:false}));
  db.repeats.forEach(r=>{ if(r.type==='daily'||Number(r.type)===day) items.push({time:r.time,end:r.end,text:r.text,repeat:true}); });
  items.forEach(it=>{ it.s=toMin(it.time); if(it.end){ it.e=toMin(it.end); if(it.e<=it.s) it.e+=1440; } else { it.e=it.s+60; } });
  return items.sort((a,b)=>a.s-b.s||a.e-b.e);
}
function fmt(sec){ sec=Math.max(0,Math.round(sec)); const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  return (h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
const RING_R=92, RING_C=2*Math.PI*RING_R;
function renderTimer(){
  const card=document.getElementById('timerCard');
  const items=mergedReal();
  const now=new Date(); const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  if(!items.length){
    card.innerHTML=`<div class="timer-status">Live Timer</div><div class="timer-empty">Nothing scheduled today<br>Add a block in Schedule</div>`;
    return;
  }
  const active=items.find(it=>nowSec>=it.s*60 && nowSec<it.e*60);
  const next=items.find(it=>it.s*60>nowSec);

  let status,statusCls,title,range,count,sub,ratio,nextHtml='';
  if(active){
    const total=(active.e-active.s)*60, remain=active.e*60-nowSec;
    status='Focusing now'; statusCls='live'; title=esc(active.text);
    range=`${active.time} – ${active.end||minToStr(active.e)}`;
    count=fmt(remain); sub='remaining'; ratio=remain/total;
    if(next) nextHtml=`<div class="timer-next"><span class="nx">Next</span> <b>${esc(next.text)}</b> · ${next.time}</div>`;
  } else if(next){
    const remain=next.s*60-nowSec;
    status='Up next'; statusCls=''; title=esc(next.text);
    range=`${next.time} – ${next.end||minToStr(next.e)}`;
    count=fmt(remain); sub='until start'; ratio=Math.min(remain/3600,1);
  } else {
    card.innerHTML=`<div class="timer-status">Live Timer</div><div class="timer-empty">All done for today<br>Great work</div>`;
    return;
  }
  const offset=RING_C*(1-ratio);
  card.innerHTML=`
    <div class="timer-status ${statusCls}">${status}</div>
    <div class="ring-wrap">
      <svg width="210" height="210" viewBox="0 0 210 210">
        <defs><linearGradient id="ringgrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="var(--primary)"/><stop offset="1" stop-color="var(--primary-2)"/>
        </linearGradient></defs>
        <circle class="ring-bg" cx="105" cy="105" r="${RING_R}"/>
        <circle class="ring-fg" cx="105" cy="105" r="${RING_R}" stroke-dasharray="${RING_C}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="ring-center"><div class="ring-count">${count}</div><div class="ring-sub">${sub}</div></div>
    </div>
    <div class="timer-title">${title}</div>
    <div class="timer-range">${range}</div>
    ${nextHtml}`;
}

let focusOn=false;
const focusEl=document.getElementById('focusMode');
function enterFocus(){ focusOn=true; focusEl.classList.add('show'); renderFocus(); }
function exitFocus(){ focusOn=false; focusEl.classList.remove('show'); }
document.getElementById('focusStart').onclick=enterFocus;
document.getElementById('focusTop').onclick=enterFocus;
document.getElementById('focusExit').onclick=exitFocus;
function renderFocus(){
  if(!focusOn) return;
  const inner=document.getElementById('focusInner');
  const items=mergedReal();
  const now=new Date(); const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  if(!items.length){ inner.className='focus-inner';
    inner.innerHTML=`<div class="f-status">Focus</div><div class="f-title">Nothing scheduled today</div><div class="f-sub">Add a block in Schedule to begin.</div>`; return; }
  const active=items.find(it=>nowSec>=it.s*60 && nowSec<it.e*60);
  const next=items.find(it=>it.s*60>nowSec);
  if(active){
    const remain=active.e*60-nowSec;
    inner.className='focus-inner';
    inner.innerHTML=`<div class="f-status">Focusing</div>
      <div class="f-title">${esc(active.text)}</div>
      <div class="f-count">${fmt(remain)}</div>
      <div class="f-sub">remaining · ${active.time}–${active.end||minToStr(active.e)}</div>
      ${next?`<div class="f-next">Up next · <b>${esc(next.text)}</b> at ${next.time}</div>`:''}`;
  } else if(next){
    const remain=next.s*60-nowSec;
    inner.className='focus-inner f-rest';
    inner.innerHTML=`<div class="f-status">Break</div>
      <div class="f-title">Take a breath</div>
      <div class="f-count">${fmt(remain)}</div>
      <div class="f-sub">until <b>${esc(next.text)}</b> · ${next.time}</div>`;
  } else {
    inner.className='focus-inner';
    inner.innerHTML=`<div class="f-status">Done</div><div class="f-title">That's a wrap</div><div class="f-sub">Great work today.</div>`;
  }
}

let notifyOn=localStorage.getItem('schedulerNotify')==='1';
function setNotifyUI(){
  document.getElementById('notifyIcon').textContent=notifyOn?'🔔':'🔕';
  document.getElementById('notifyLabel').textContent=notifyOn?'On':'Notify';
}
setNotifyUI();
document.getElementById('notifyToggle').onclick=async()=>{
  if(!notifyOn){
    if(!('Notification' in window)){ alert('This browser does not support notifications.'); return; }
    let perm=Notification.permission;
    if(perm!=='granted') perm=await Notification.requestPermission();
    if(perm!=='granted'){ alert('Notifications are blocked. Click the lock icon in the address bar → allow Notifications.'); return; }
    notifyOn=true; beep(); new Notification('Notifications on 🔔',{body:"You'll be alerted when blocks start and end."});
  } else { notifyOn=false; }
  localStorage.setItem('schedulerNotify',notifyOn?'1':'0'); setNotifyUI();
};
function beep(){
  try{ const a=new (window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination); o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(.15,a.currentTime); g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);
    o.start(); o.stop(a.currentTime+.5);
  }catch(e){}
}
const fired=new Set();
function checkNotify(){
  if(!notifyOn) return;
  const now=new Date(); const k=key(now); const nm=now.getHours()*60+now.getMinutes(); const sec=now.getSeconds();
  if(sec>2) return; // 매 분 시작 시점에만 확인
  mergedReal().forEach(it=>{
    const endM=it.e>=1440?it.e-1440:it.e;
    const idBase=k+'|'+it.time+'|'+it.text;
    if(nm===it.s && !fired.has(idBase+'|s')){ fired.add(idBase+'|s'); beep();
      new Notification('▶ '+it.text+' started',{body:`${it.time} – ${it.end||minToStr(it.e)}`}); }
    if(nm===endM && !fired.has(idBase+'|e')){ fired.add(idBase+'|e'); beep();
      new Notification('■ '+it.text+' ended',{body:'Nice work — check what\'s next.'}); }
  });
}

let sb=null, user=null, syncTimer=null, applyingRemote=false;

function applyRemote(d){
  if(!d) return;
  applyingRemote=true;
  db={schedules:d.schedules||{}, todos:d.todos||{}, repeats:d.repeats||[]};
  localStorage.setItem(KEY,JSON.stringify(db));

async function pullRemote(){
  const { data, error } = await sb.from('scheduler_data').select('data').eq('user_id',user.id).maybeSingle();
  if(error){ console.warn('pull',error); return; }
  if(data && data.data) applyRemote(data.data);
  else await pushRemote(); // 원격이 비어있으면 현재 로컬을 업로드
}
async function pushRemote(){
  if(!user) return;
  const { error } = await sb.from('scheduler_data').upsert({user_id:user.id, data:db, updated_at:new Date().toISOString()});
  if(error) console.warn('push',error);
}
function subscribeRemote(){
  sb.channel('sched-'+user.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'scheduler_data',filter:'user_id=eq.'+user.id},
       p=>{ if(p.new && p.new.data) applyRemote(p.new.data); })
    .subscribe();
}

document.getElementById('cloudToggle').onclick=openAuth;
async function initCloud(){
  updateCloudUI();
  if(!cloudEnabled()) return;
  sb=window.supabase.createClient(SUPABASE_URL.trim().replace(/\/+$/,''),SUPABASE_ANON_KEY.trim());
  const { data:{ session } }=await sb.auth.getSession();
  if(session){ user=session.user; await pullRemote(); subscribeRemote(); }
  sb.auth.onAuthStateChange(async(_e,s)=>{
    const wasUser=user; user=s?.user||null;
    if(user && !wasUser){ await pullRemote(); subscribeRemote(); }
    updateCloudUI(); renderAuthBody();
  });
  updateCloudUI();
}

// ===== 주간 통계 =====
function spanMin(time,end){ let s=toMin(time), e=end?toMin(end):s+60; if(e<=s) e+=1440; return e-s; }
function renderStats(){
  const bars=document.getElementById('statBars'); if(!bars) return;
  const sum=document.getElementById('statSummary');
  const todayK=key(new Date());
  let totalDone=0,totalTodo=0,totalMin=0, html='';
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); const k=key(d);
    const arr=db.todos[k]||[]; const done=arr.filter(t=>t.done).length, tot=arr.length;
    const pct=tot?Math.round(done/tot*100):0; totalDone+=done; totalTodo+=tot;
    const day=d.getDay(); let mins=0;
    (db.schedules[k]||[]).forEach(it=>{ mins+=spanMin(it.time,it.end); });
    db.repeats.forEach(r=>{ if(r.type==='daily'||Number(r.type)===day) mins+=spanMin(r.time,r.end); });
    totalMin+=mins;
    const isT=k===todayK;
    html+=`<div class="sb-col">
      <span class="sb-pct">${tot?pct+'%':'·'}</span>
      <div class="sb-track"><div class="sb-fill ${isT?'today':''}" style="height:${tot?pct:0}%"></div></div>
      <span class="sb-day ${isT?'today':''}">${WEEK[day]}</span></div>`;
  }
  bars.innerHTML=html;
  const avg=totalTodo?Math.round(totalDone/totalTodo*100):0;
  const h=Math.floor(totalMin/60), m=totalMin%60;
  sum.innerHTML=`
    <div class="stat-box"><div class="num">${avg}<span class="unit">%</span></div>
      <div class="lbl">Avg. completion (${totalDone}/${totalTodo})</div></div>
    <div class="stat-box"><div class="num">${h}<span class="unit">h</span>${m?` ${m}<span class="unit">m</span>`:''}</div>
      <div class="lbl">Total scheduled · last 7 days</div></div>`;
}

// ===== 위젯 드래그 순서 변경 =====
let widgetOrder=JSON.parse(localStorage.getItem('schedulerWidgetOrder')||'{}');
function colId(col){ return col.classList.contains('col-left')?'left':col.classList.contains('col-center')?'center':'right'; }
function saveWidgetOrder(){
  document.querySelectorAll('.col').forEach(col=>{
    widgetOrder[colId(col)]=[...col.querySelectorAll('.widget[data-wkey]')].map(w=>w.dataset.wkey);
  });
  localStorage.setItem('schedulerWidgetOrder',JSON.stringify(widgetOrder));
}
function applyWidgetOrder(){
  document.querySelectorAll('.col').forEach(col=>{
    const order=widgetOrder[colId(col)]; if(!order) return;
    order.forEach(k=>{ const w=col.querySelector(`.widget[data-wkey="${k}"]`); if(w) col.appendChild(w); });
  });
}
let dragEl=null;
function getDragAfter(col,y){
  const els=[...col.querySelectorAll('.widget[data-wkey]:not(.dragging)')];
  return els.reduce((c,child)=>{ const b=child.getBoundingClientRect(); const off=y-b.top-b.height/2;
    return (off<0 && off>c.off)?{off,el:child}:c; },{off:-Infinity,el:null}).el;
}
function initDnD(){
  document.querySelectorAll('.widget[data-wkey]').forEach(w=>{
    const handle=w.querySelector('.drag-handle'); if(!handle) return;
    handle.addEventListener('mousedown',()=>w.setAttribute('draggable','true'));
    w.addEventListener('dragstart',e=>{ dragEl=w; e.dataTransfer.effectAllowed='move';
      setTimeout(()=>w.classList.add('dragging'),0); });
    w.addEventListener('dragend',()=>{ w.classList.remove('dragging'); w.removeAttribute('draggable'); dragEl=null; saveWidgetOrder(); });
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>{ if(!dragEl) return; e.preventDefault();
      const after=getDragAfter(col,e.clientY);
      if(after==null) col.appendChild(dragEl); else col.insertBefore(dragEl,after); });
  });
}
